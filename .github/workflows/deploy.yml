name: deploy-to-rhel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on:
      - self-hosted
      - linux
      - x64

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy App
        run: |
          echo "Stopping old containers..."
          docker stop my-python-app || true
          docker rm my-python-app || true

          echo "Building image..."
          docker build -t simple-python-app:latest -f docker/Dockerfile.

          echo "Starting container..."
          docker run -d \
            --name my-python-app \
            -p 8080:8080 \
            simple-python-app:latest

