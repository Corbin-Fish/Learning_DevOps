- name: Configure OCI Instance
  hosts: oci_instances
  gather_facts: false
  tasks:
    - name: Wait for connect
      ansible.builtin.wait_for_connection:
        timeout: 300
        delay: 5

    - name: Verify connection and gather baseline info
      ansible.builtin.ping:

    - name: Wait for cloud-init
      ansible.builtin.command: cloud-init status --wait
      changed_when: false

    - name: Update all system packages
      ansible.builtin.dnf:
        name: "*"
        state: latest

    - name: Install Py 3.11
      ansible.builtin.dnf:
        name: 
          - python3.11
          - python3.11-pip
          - python3.11-setuptools
        state: present

- name: Configure Docker
  hosts: oci_instances
  become: true
  vars:
    repo_url: "https://github.com/Corbin-Fish/Learning_DevOps"
    repo_branch: "main"
    project_dest: "/opt/my_py_app"
    container_name: "py_app"
    app_port_host: "8080"
    app_port_container: "8080"
    ansible_python_interpreter: /usr/bin/python3.11
  
  tasks:
    - name: Remove Podman and conflicting emulation packages
      ansible.builtin.dnf:
        name:
          - podman
          - buildah
          - docker
        state: absent

    - name: Install Python Dependency
      ansible.builtin.command: /usr/bin/pip3.11 install requests
      changed_when: false

    - name: Add official Docker CE repository
      ansible.builtin.get_url:
        url: https://download.docker.com/linux/centos/docker-ce.repo
        dest: /etc/yum.repos.d/docker-ce.repo
        mode: '0644'

    - name: Install authentic Docker CE packages
      ansible.builtin.dnf:
        name:
          - git
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Start and enable Docker daemon service
      ansible.builtin.systemd:
        name: docker
        state: started
        enabled: true

    - name: Pull from main
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ project_dest }}"
        version: "{{ repo_branch }}"
        force: true
      register: git_repo

    - name: Build Docker image
      community.docker.docker_image:
        name: "my_python_app:latest"
        build:
          path: "{{ project_dest }}"
          dockerfile: docker/Dockerfile
          pull: true
        source: build

    - name: Ensure Python app container is running
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "my_python_app:latest"
        state: started
        restart_policy: always
        ports:
          - "{{ app_port_host }}:{{ app_port_container }}"
